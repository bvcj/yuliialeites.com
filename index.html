<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YuliiaLeites.com</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #90e0ef;
      color: #2b2b2b;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-weight: 400;
      font-size: 26px;
      margin-bottom: 5px;
    }

    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 14px;
      border: 1px solid #ddd;
      text-decoration: none;
      color: #2b2b2b;
      background: white;
      border-radius: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2b2b2b;
      color: white;
    }

    .section {
      margin-top: 40px;
      text-align: left;
    }

    .section h2 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
    }

    .email {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 12px;
      border: none;
      background: #2b2b2b;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    footer {
      margin-top: 50px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Dr. Your Name</h1>
  <p>Psychoanalysis & psychotherapy</p>

  <div class="links">
    <a class="btn" href="#">Book a Session</a>
    <a class="btn" href="#">About Me</a>
    <a class="btn" href="#">Approach</a>
    <a class="btn" href="#">Contact</a>
  </div>

  <div class="section">
    <h2>NEWSLETTER</h2>
    <div class="email">
      <input type="email" placeholder="Your email">
      <button>Subscribe</button>
    </div>
  </div>

  <footer>
    © 2026 Your Practice
  </footer>

</div>

</body>
</html>
