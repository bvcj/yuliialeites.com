<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#0077b6">
  <title>Yuliia Leites</title>

  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Averia Serif Libre", serif;
      background: #f8f7ff;
      color: #000814;
      display: flex;
      justify-content: center;
      font-size: 19px;
    }

    .container {
      max-width: 520px;
      width: 100%;
      padding: 70px 22px;
      text-align: center;
    }

    /* Links Style */
    .link {
      display: inline-block;
      margin: 12px 0;
      padding: 6px 0px;
      text-decoration: none;
      color: #000814;
      position: relative;
      transition: color 0.25s ease;
    }

    /* Hidden image by default */
    .hover-image {
      display: none; /* Hide image initially */
      position: absolute;
      top: 0;
      left: 100%; /* Position image to the right of the link */
      margin-left: 10px; /* Small margin to separate image from text */
      width: 40px;  /* Small size of the image */
      height: 40px; /* Make the image square */
      object-fit: cover; /* Make sure the image fits inside the square */
      opacity: 0; /* Start with 0 opacity */
      transition: opacity 0.3s ease-in-out; /* Fade-in effect */
    }

    /* Display and fade in the image when hovering the link */
    .link:hover .hover-image {
      display: block;
      opacity: 1; /* Fade to full opacity */
    }

    /* Other styles */
    h1 {
      font-size: 54px;
      font-weight: 400;
      color: #0077b6;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 20px;
      color: #219ebc;
      margin-bottom: 50px;
      letter-spacing: 1px;
    }

    footer {
      margin-top: 70px;
      font-size: 11px;
      color: #219ebc;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <h1>Yuliia Leites</h1>
  <div class="subtitle">Psychoanalysis Psychotherapist</div>

  <!-- PUBLICATIONS -->
  <h2>PUBLICATIONS</h2>

  <a class="link" href="https://www.e-flux.com/notes/6783384/from-mania-to-depression-full-scale-war-in-ukraine" target="_blank">
    From Mania to Depression — e-flux
    <!-- Image from external website (copy-paste the URL from the image you want to use) -->
    <img class="hover-image" src="https://www.e-flux.com/assets/e-flux-logo.png" alt="Image">
  </a>

  <a class="link" href="https://thediasporist.de/not-ready-for-the-light/" target="_blank">
    Not Ready for the Light — The Diasporist
    <img class="hover-image" src="https://www.thediasporist.de/logo.png" alt="Image">
  </a>

  <a class="link" href="https://www.spectorbooks.com/book/notes-on-living" target="_blank">
    Notes on Living — Spector Books
    <img class="hover-image" src="https://www.spectorbooks.com/assets/spector-logo.png" alt="Image">
  </a>

  <footer>
    © 2026 · Yuliia Leites
  </footer>

</div>

</body>
</html>
